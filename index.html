<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kino-Typed</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=Dancing+Script:wght@600;700&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow-x:hidden; }
:root {
  --ink: #1a1008;
  --rose: #8b2020;
  --gold: #c8a050;
  --tw-start: 75.4%;  /* where typewriter body starts in the PNG */
}

body {
  font-family: 'Special Elite', cursive;
  background: #cfc9c0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,0,0,.013) 80px, rgba(0,0,0,.013) 81px),
    repeating-linear-gradient(0deg,  transparent, transparent 80px, rgba(0,0,0,.013) 80px, rgba(0,0,0,.013) 81px);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  opacity:.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

.scene { width:100%; display:flex; flex-direction:column; align-items:center; }
.scene.off { display:none; }

/* ══════════════════════════════════
   WRITING SCENE
══════════════════════════════════ */
#writing { padding: 1.5rem 1rem 3rem; }

.writing-title {
  font-family: 'Dancing Script', cursive;
  font-size: 1.8rem; color: #4a3828;
  letter-spacing:.05em; margin-bottom: 1.2rem;
  opacity:.75; text-align:center;
  animation: fadeDown .8s ease both;
}
@keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:.75;transform:translateY(0)} }

/* ── THE COMPOSITE ──
   .tw-wrap is sized by the image (natural aspect ratio).
   Everything is absolutely positioned inside it.
   Paper sits BEHIND the typewriter PNG, anchored to the platen line.
   PNG is 406×614; machine body starts at y=463 = 75.41% from top.
   So paper-area bottom edge = 75.41% from top of .tw-wrap.
*/
.tw-wrap {
  position: relative;
  width: min(420px, 94vw);
  animation: riseIn .9s cubic-bezier(.22,1,.36,1) .2s both;
}
@keyframes riseIn { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

/* Typewriter PNG — defines the height of .tw-wrap */
.tw-img {
  display: block;
  width: 100%;
  position: relative;   /* in-flow so .tw-wrap gets its height from this */
  z-index: 10;
  pointer-events: none;
  filter: drop-shadow(0 16px 36px rgba(0,0,0,.3));
}

/* Paper window — clips everything; only this slot is visible */
.paper-area {
  position: absolute;
  top: 0;
  left: 6%;
  right: 6%;
  bottom: 24.59%;
  overflow: hidden;
  z-index: 5;
  pointer-events: none;
}

/* Love-letter sheet — starts FULLY HIDDEN below the slot.
   JS moves it up by LINE_H px per line via translateY. */
.paper-bg {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background-image: url('lovepaper.jpg');
  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: top center;
  box-shadow: 0 -4px 14px rgba(0,0,0,.2);
  transition: transform .15s cubic-bezier(.25,.46,.45,.94);
  height: 420%;
  /* start fully below the slot */
  transform: translateY(100%);
}

/* Typed text — anchored to the bottom of the slot (the platen line).
   Grows upward as lines are added. NOT inside paper-bg. */
.paper-text {
  position: absolute;
  bottom: 4px;
  left: 10%; right: 10%;
  font-family: 'Special Elite', cursive;
  font-size: .74rem;
  line-height: 24px;
  color: #2a1010;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.paper-cursor {
  display: inline-block;
  width: 8px; height: 2px;
  background: #2a1010;
  vertical-align: baseline;
  margin-bottom: 3px; margin-left: 1px;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Invisible textarea — covers the paper area, triggers mobile keyboard */
.real-input {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 24.59%;
  opacity: 0;
  z-index: 15;
  resize: none;
  border: none; outline: none;
  background: transparent;
  font-size: 16px; /* prevents iOS zoom */
  -webkit-appearance: none;
  cursor: text;
}

/* keyboard click zone (bottom portion = keyboard area of image) */
.keyboard-zone {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 24%;
  z-index: 20;
  cursor: text;
}

/* key flash */
.key-flash {
  position: absolute;
  bottom: 26%; left: 50%; transform: translateX(-50%);
  font-family: 'Special Elite', cursive; font-size: .65rem;
  color: rgba(255,255,255,.9); background: rgba(70,100,130,.6);
  padding: .1rem .4rem; border-radius: 3px;
  opacity: 0; pointer-events:none; z-index:30;
  transition: opacity .06s; letter-spacing:.05em;
}
.key-flash.show { opacity:1; }
.return-flash {
  position: absolute;
  bottom: 26%; right: 5%;
  font-family: 'Special Elite', cursive; font-size: .5rem;
  color: rgba(255,255,255,.7); background: rgba(50,70,90,.55);
  padding: .08rem .35rem; border-radius: 2px;
  opacity:0; pointer-events:none; z-index:30; transition: opacity .08s;
}
.return-flash.show { opacity:1; }

/* line counter */
.line-counter {
  font-family: 'Special Elite', cursive; font-size:.6rem;
  color: rgba(80,65,55,.4); letter-spacing:.18em;
  text-align:center; margin-top:.5rem;
}

/* controls */
.controls-bar {
  margin-top: 1.2rem;
  display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap;
  animation: riseIn .9s cubic-bezier(.22,1,.36,1) .5s both;
}
.ctrl-btn {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:.95rem; letter-spacing:.1em;
  padding:.55rem 1.6rem; border-radius:2px; cursor:pointer;
  transition:all .28s cubic-bezier(.22,1,.36,1); border:1px solid;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn.primary {
  background:linear-gradient(135deg,#6a90a8,#4a6878);
  color:#f0f5f8; border-color:rgba(150,190,220,.4);
  box-shadow:0 4px 18px rgba(80,120,150,.3);
}
.ctrl-btn.primary:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(80,120,150,.45); }
.ctrl-btn.ghost {
  background:transparent; color:#5a7888; border-color:rgba(90,120,140,.3);
}
.ctrl-btn.ghost:hover { background:rgba(90,120,140,.09); }
.ctrl-btn:active { transform:scale(.97); }

/* ══════════════════════════════════
   SEAL PICKER
══════════════════════════════════ */
#sealPicker {
  position:fixed; inset:0; z-index:200;
  background:rgba(14,8,4,.83); backdrop-filter:blur(8px) saturate(.7);
  display:none; align-items:center; justify-content:center;
  opacity:0; transition:opacity .35s ease;
}
#sealPicker.active { display:flex; opacity:1; }
.seal-modal {
  width:min(400px,92vw);
  background:linear-gradient(160deg,#fdf6e8,#f5e8d0);
  text-align:center; padding:2.2rem 1.8rem 1.8rem;
  box-shadow:0 28px 70px rgba(0,0,0,.5);
  border:1px solid rgba(200,80,80,.15);
  animation:modalRise .45s cubic-bezier(.22,1,.36,1) both;
}
@keyframes modalRise { from{opacity:0;transform:translateY(36px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.seal-title { font-family:'Dancing Script',cursive; font-size:2.2rem; color:var(--rose); margin-bottom:.15rem; }
.seal-sub { font-family:'IM Fell English',serif; font-style:italic; font-size:.75rem; color:var(--rose); opacity:.6; letter-spacing:.15em; margin-bottom:1.1rem; }
.divider { height:1px; background:linear-gradient(90deg,transparent,rgba(180,60,60,.25),transparent); margin-bottom:1.1rem; }
.seal-options { display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-bottom:1.1rem; }
.seal-opt { border:2px solid transparent; border-radius:7px; padding:.55rem .2rem; cursor:pointer; transition:all .22s cubic-bezier(.22,1,.36,1); background:rgba(255,255,255,.6); -webkit-tap-highlight-color:transparent; }
.seal-opt:hover   { border-color:#e87878; transform:translateY(-3px) scale(1.05); }
.seal-opt.selected { border-color:var(--rose); background:rgba(220,150,150,.18); }
.seal-emoji { font-size:1.7rem; display:block; margin-bottom:.2rem; }
.seal-label { font-family:'IM Fell English',serif; font-size:.57rem; color:var(--rose); font-style:italic; }
.recipient-wrap { margin-bottom:1.1rem; }
.recipient-label { font-family:'Dancing Script',cursive; font-size:.95rem; color:var(--rose); opacity:.65; display:block; margin-bottom:.3rem; }
.recipient-input {
  background:transparent; border:none; border-bottom:1.5px solid rgba(180,60,60,.35);
  padding:.28rem .5rem; font-family:'Special Elite',cursive;
  font-size:16px; /* no zoom on iOS */ color:var(--ink);
  text-align:center; width:200px; outline:none; transition:border-color .3s;
}
.recipient-input:focus { border-bottom-color:var(--rose); }
.recipient-input::placeholder { color:rgba(160,90,80,.35); font-style:italic; }
.modal-actions { display:flex; flex-direction:column; gap:.5rem; align-items:center; }
.modal-btn {
  width:100%; max-width:240px;
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:.95rem; letter-spacing:.07em; padding:.6rem 1.4rem; border-radius:2px;
  cursor:pointer; transition:all .28s cubic-bezier(.22,1,.36,1); border:1.5px solid;
  -webkit-tap-highlight-color:transparent;
}
.modal-btn.primary { background:linear-gradient(135deg,var(--rose),#6a1010); color:#fff; border-color:rgba(200,80,80,.4); box-shadow:0 4px 16px rgba(160,30,30,.3); }
.modal-btn.primary:hover { transform:translateY(-2px); box-shadow:0 7px 24px rgba(160,30,30,.45); }
.modal-btn.ghost { background:transparent; color:var(--rose); border-color:rgba(180,60,60,.25); }
.modal-btn.ghost:hover { background:rgba(180,60,60,.06); }

/* ══════════════════════════════════
   SHIBA
══════════════════════════════════ */
#shibaScene {
  position:fixed; inset:0; z-index:300;
  background:linear-gradient(160deg,#f8f0d8,#eedfc0,#e4d0a8);
  align-items:center; justify-content:center; flex-direction:column; display:none;
}
#shibaScene.active { display:flex; }
.shiba-stage { width:min(460px,88vw); height:200px; position:relative; overflow:hidden; margin-bottom:1.2rem; }
.shiba-floor { position:absolute; bottom:16px; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(150,100,40,.2),transparent); }
.shiba-ani { position:absolute; bottom:20px; font-size:3.8rem; animation:shibaRun 2.8s cubic-bezier(.25,.46,.45,.94) forwards; filter:drop-shadow(3px 5px 8px rgba(0,0,0,.18)); }
@keyframes shibaRun {
  0%   { left:-80px; transform:scaleX(-1); }
  38%  { left:calc(50% - 32px); transform:scaleX(-1); }
  45%  { left:calc(50% - 32px); transform:scaleX(-1) rotate(-12deg); }
  55%  { left:calc(50% - 32px); transform:scaleX(-1) rotate(12deg); }
  65%  { left:calc(50% - 32px); transform:scaleX(-1) rotate(-4deg); }
  80%  { left:calc(50% - 32px); transform:scaleX(-1) scale(1.06); }
  100% { left:calc(50% - 32px); transform:scaleX(-1) scale(1); }
}
.env-on-stage  { position:absolute; top:35%; right:16%; transform:translateY(-50%); font-size:3.2rem; }
.shiba-caption { font-family:'Dancing Script',cursive; font-size:1.4rem; color:var(--rose); opacity:0; animation:fadeIn .5s ease 2.2s forwards; text-align:center; }
.shiba-caption.done { animation:popIn .4s cubic-bezier(.22,1,.36,1) forwards; }
@keyframes popIn  { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ══════════════════════════════════
   ENVELOPE SCENE
══════════════════════════════════ */
#envelopeScene {
  display:none; min-height:100vh; flex-direction:column;
  align-items:center; justify-content:center; padding:3rem 1rem;
  background: radial-gradient(ellipse 100% 60% at 50% 0%,rgba(200,120,100,.12) 0%,transparent 60%),
    linear-gradient(170deg,#f5e8d8,#e8d4bc 40%,#dcc8a8);
}
#envelopeScene.active { display:flex; }
.env-title { font-family:'Dancing Script',cursive; font-size:1.3rem; color:var(--rose); opacity:.55; letter-spacing:.1em; margin-bottom:2rem; animation:riseIn .7s ease forwards; }
.envelope-wrap { perspective:1000px; margin-bottom:2.2rem; cursor:pointer; animation:riseIn .9s cubic-bezier(.22,1,.36,1) .1s both; }
.envelope { width:min(360px,84vw); position:relative; transition:transform .5s cubic-bezier(.22,1,.36,1),filter .3s; filter:drop-shadow(0 14px 36px rgba(0,0,0,.2)); }
.envelope:hover { transform:translateY(-7px) rotateX(4deg) rotateZ(-1deg); filter:drop-shadow(0 22px 46px rgba(0,0,0,.28)); }
.envelope.opening { animation:envOpen 1.1s cubic-bezier(.22,1,.36,1) forwards; }
@keyframes envOpen {
  0%   { transform:translateY(0) scale(1); opacity:1; }
  30%  { transform:translateY(-20px) scale(1.05) rotateX(5deg); }
  70%  { transform:translateY(10px) scale(.95) rotateX(-3deg); opacity:.8; }
  100% { transform:translateY(80px) scale(.8) rotateX(15deg); opacity:0; }
}
.env-svg { width:100%; height:auto; display:block; }
.env-address-overlay { position:absolute; bottom:19%; left:50%; transform:translateX(-50%); text-align:center; width:55%; pointer-events:none; }
.addr-to   { font-family:'IM Fell English',serif; font-style:italic; font-size:.62rem; color:#6a3030; opacity:.5; letter-spacing:.12em; display:block; margin-bottom:.2rem; }
.addr-name { font-family:'Special Elite',cursive; font-size:.76rem; color:#3a1818; opacity:.68; }
.seal-sticker-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:2.5rem; z-index:10; filter:drop-shadow(0 3px 8px rgba(0,0,0,.22)); transition:transform .3s; pointer-events:none; }
.envelope:hover .seal-sticker-overlay { transform:translate(-50%,-50%) scale(1.12) rotate(5deg); }
.env-actions { display:flex; gap:.9rem; flex-wrap:wrap; justify-content:center; margin-bottom:1.4rem; animation:riseIn .7s ease .3s both; }
.env-hint { font-family:'IM Fell English',serif; font-style:italic; font-size:.78rem; color:#6a4830; opacity:.48; text-align:center; animation:riseIn .7s ease .5s both; }

/* ══════════════════════════════════
   READING SCENE
══════════════════════════════════ */
#readingScene {
  display:none; min-height:100vh; flex-direction:column;
  align-items:center; justify-content:flex-start;
  padding:3rem 1rem 5rem;
  background:linear-gradient(160deg,#f0e8d8,#e8dcc8);
}
#readingScene.active { display:flex; }
.letter-paper-wrap {
  width:min(500px,90vw); position:relative;
  animation:pageUnfurl .9s cubic-bezier(.22,1,.36,1) forwards;
  transform-origin:top center;
  filter:drop-shadow(0 12px 36px rgba(0,0,0,.18));
}
@keyframes pageUnfurl {
  0%   { transform:scaleY(.01) rotateX(20deg); opacity:0; }
  55%  { transform:scaleY(1.03) rotateX(-2deg); opacity:1; }
  100% { transform:scaleY(1) rotateX(0deg); opacity:1; }
}
.letter-bg-img { width:100%; display:block; border-radius:2px; }
.letter-text-overlay {
  position:absolute; top:28%; left:13%; right:13%; bottom:16%;
  display:flex; flex-direction:column; overflow:hidden;
}
.letter-date-line { font-family:'IM Fell English',serif; font-style:italic; font-size:.68rem; color:#5a2020; opacity:.6; text-align:right; margin-bottom:.7rem; }
.letter-body-text { font-family:'Special Elite',cursive; font-size:.8rem; line-height:26px; color:#2a1010; white-space:pre-wrap; word-break:break-word; flex:1; overflow:hidden; }
.letter-seal-bottom { text-align:center; margin-top:.8rem; font-size:1.8rem; opacity:.5; animation:riseIn .5s ease 1.5s both; }
.reading-back { margin-top:2rem; animation:riseIn .7s ease .5s both; }

/* shared */
@keyframes riseIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.toast {
  position:fixed; bottom:2.2rem; left:50%; transform:translateX(-50%) translateY(80px);
  background:#1a1008; color:rgba(200,160,80,.9);
  font-family:'IM Fell English',serif; font-style:italic;
  padding:.65rem 1.8rem; border-radius:2px; font-size:.86rem; letter-spacing:.06em;
  transition:transform .42s cubic-bezier(.22,1,.36,1); z-index:9999;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══════════════ WRITING ══════════════ -->
<div id="writing" class="scene">
  <p class="writing-title">Kino-Typed &nbsp;·&nbsp; write a letter</p>

  <div class="tw-wrap" id="twWrap">

    <!-- Typewriter PNG is in-flow: gives .tw-wrap its height -->
    <img class="tw-img" id="twImg" src="typewriter.png" alt="typewriter">

    <!-- Paper area — clips the slot; paper slides up behind typewriter -->
    <div class="paper-area" id="paperArea">
      <!-- Love-letter sheet: starts hidden below, scrolls up per line -->
      <div class="paper-bg" id="paperBg"></div>
      <!-- Text is a sibling: fixed at the platen line, paper scrolls behind it -->
      <div class="paper-text" id="paperText">
        <span class="paper-cursor"></span>
      </div>
    </div>

    <!-- Key flash labels -->
    <div class="key-flash"    id="keyFlash"></div>
    <div class="return-flash" id="returnFlash">⏎</div>

    <!-- Transparent textarea — triggers mobile keyboard on tap anywhere on paper -->
    <textarea class="real-input" id="realInput"
      autocomplete="off" autocorrect="off" autocapitalize="off"
      spellcheck="false" inputmode="text"
      placeholder=""></textarea>

    <!-- Click zone over keyboard area of image -->
    <div class="keyboard-zone" onclick="focusInput()"></div>
  </div>

  <p class="line-counter" id="lineCounter">tap anywhere to begin</p>

  <div class="controls-bar">
    <button class="ctrl-btn ghost"   onclick="clearAll()">clear</button>
    <button class="ctrl-btn primary" onclick="openSealPicker()">fold &amp; seal →</button>
  </div>
</div>

<!-- ══════════════ SEAL PICKER ══════════════ -->
<div id="sealPicker">
  <div class="seal-modal">
    <div class="seal-title">Love Letters</div>
    <div class="seal-sub">× choose your seal ×</div>
    <div class="divider"></div>
    <div class="seal-options">
      <div class="seal-opt selected" data-seal="💌" onclick="selectSeal(this)"><span class="seal-emoji">💌</span><span class="seal-label">love</span></div>
      <div class="seal-opt" data-seal="🕊️" onclick="selectSeal(this)"><span class="seal-emoji">🕊️</span><span class="seal-label">official</span></div>
      <div class="seal-opt" data-seal="🌸" onclick="selectSeal(this)"><span class="seal-emoji">🌸</span><span class="seal-label">sakura</span></div>
      <div class="seal-opt" data-seal="🌙" onclick="selectSeal(this)"><span class="seal-emoji">🌙</span><span class="seal-label">moonlit</span></div>
      <div class="seal-opt" data-seal="🍵" onclick="selectSeal(this)"><span class="seal-emoji">🍵</span><span class="seal-label">matcha</span></div>
      <div class="seal-opt" data-seal="🎐" onclick="selectSeal(this)"><span class="seal-emoji">🎐</span><span class="seal-label">windbell</span></div>
      <div class="seal-opt" data-seal="🐾" onclick="selectSeal(this)"><span class="seal-emoji">🐾</span><span class="seal-label">shiba</span></div>
      <div class="seal-opt" data-seal="✨" onclick="selectSeal(this)"><span class="seal-emoji">✨</span><span class="seal-label">shimmer</span></div>
    </div>
    <div class="recipient-wrap">
      <span class="recipient-label">addressed to —</span>
      <input class="recipient-input" id="recipientInput" type="text"
        placeholder="their name…" maxlength="40" inputmode="text">
    </div>
    <div class="divider"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="confirmSeal()">summon the shiba 🐕</button>
      <button class="modal-btn ghost"   onclick="closeSealPicker()">keep writing</button>
    </div>
  </div>
</div>

<!-- ══════════════ SHIBA ══════════════ -->
<div id="shibaScene">
  <div class="shiba-stage">
    <div class="shiba-floor"></div>
    <div class="env-on-stage">✉️</div>
    <div class="shiba-ani">🐕</div>
  </div>
  <p class="shiba-caption" id="shibaCaption">*lick* *lick*</p>
</div>

<!-- ══════════════ ENVELOPE ══════════════ -->
<div id="envelopeScene">
  <p class="env-title">sealed with love · 封印された</p>
  <div class="envelope-wrap">
    <div class="envelope" id="theEnvelope" onclick="openEnvelopeAnim()">
      <div style="position:relative">
        <svg class="env-svg" viewBox="0 0 380 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="eb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8f0de"/><stop offset="100%" stop-color="#ecdcc4"/></linearGradient>
            <linearGradient id="ef" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#eddcc4"/><stop offset="100%" stop-color="#d8c8a8"/></linearGradient>

        <div class="env-address-overlay">

<!-- ══════════════ READING ══════════════ -->
<div id="readingScene">
  <div class="letter-paper-wrap">
    <img class="letter-bg-img" src="lovepaper.jpg" alt="letter paper">
    <div class="letter-text-overlay">
      <div class="letter-date-line"   id="readingDate"></div>
      <div class="letter-body-text"   id="readingBody"></div>
      <div class="letter-seal-bottom" id="readingSeal"></div>
    </div>
  </div>
  <button class="ctrl-btn ghost reading-back" onclick="writeAnother()">write your own →</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
let fullText     = '';
let selectedSeal = '💌';
const LINE_H         = 24;   // px — line-height on paper
const CHARS_PER_LINE = 36;   // approx chars per line

// ─────────────────────────────────────────
// Audio
// ─────────────────────────────────────────
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playClack() {
  initAudio(); const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*.048, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(audioCtx.sampleRate*.009));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(.16+Math.random()*.07,t); g.gain.exponentialRampToValueAtTime(.001,t+.048);
  const f = audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1700+Math.random()*500; f.Q.value=.85;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}
function playReturn() {
  initAudio(); const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*.22, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(audioCtx.sampleRate*.08)) * .55;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(.3,t); g.gain.exponentialRampToValueAtTime(.001,t+.22);
  const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}
function playBell() {
  initAudio(); const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.frequency.setValueAtTime(2200,t); osc.frequency.exponentialRampToValueAtTime(1800,t+.12);
  g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.001,t+.35);
  osc.connect(g); g.connect(audioCtx.destination); osc.start(t); osc.stop(t+.35);
}

// ─────────────────────────────────────────
// Input — textarea approach works on mobile
// We sync the textarea's value → fullText on every input event
// ─────────────────────────────────────────
function focusInput() {
  document.getElementById('realInput').focus();
}
setTimeout(focusInput, 500);

const ta = document.getElementById('realInput');

// The textarea value IS the source of truth.
// We intercept keydown for sounds, but use 'input' event for actual content sync
// so mobile (which doesn't fire keydown for every char) also works.

ta.addEventListener('keydown', e => {
  initAudio();
  if (e.key === 'Enter') {
    playReturn(); showReturnFlash();
  } else if (e.key === 'Backspace') {
    playClack();
  } else if (e.key === ' ' || e.key.length === 1) {
    playClack();
    flashKey(e.key === ' ' ? '␣' : e.key);
    const lastLine = fullText.split('\n').at(-1) || '';
    if (lastLine.length === CHARS_PER_LINE - 4) playBell();
  }
});

ta.addEventListener('input', () => {
  // Always trust textarea as ground truth — no diffing desync
  const newText = ta.value;

  // Sound detection for mobile (no keydown per char)
  if (newText.length > fullText.length) {
    const added = newText.slice(fullText.length);
    if (added.includes('\n')) { initAudio(); playReturn(); showReturnFlash(); }
    else { initAudio(); playClack(); flashKey(added.slice(-1)); }
  }

  fullText = newText;
  renderText();
});

// Keep textarea in sync if user pastes
ta.addEventListener('paste', () => {
  setTimeout(() => { fullText = ta.value; renderText(); }, 0);
});

function flashKey(k) {
  if (!k || k === '\n') return;
  const el = document.getElementById('keyFlash');
  el.textContent = k.toUpperCase(); el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 130);
}
function showReturnFlash() {
  const el = document.getElementById('returnFlash');
  el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 300);
}

// ─────────────────────────────────────────
// Render — love-letter sheet scrolls UP
// ─────────────────────────────────────────
function renderText() {
  const pt   = document.getElementById('paperText');
  const bg   = document.getElementById('paperBg');
  const area = document.getElementById('paperArea');

  pt.innerHTML = escHtml(fullText) + '<span class="paper-cursor"></span>';

  const lines = countLines(fullText);
  document.getElementById('lineCounter').textContent =
    lines <= 1 ? 'tap anywhere to begin' : 'line ' + lines;

  // Paper starts fully hidden below the slot.
  // Each new line pulls it up by LINE_H px — emerges from the platen slot.
  const areaH  = area.offsetHeight || 200;
  const paperH = bg.offsetHeight   || (areaH * 4.2);
  const shift  = lines * LINE_H;
  bg.style.transform = `translateY(${paperH - shift}px)`;
}

function countLines(text) {
  let total = 0;
  text.split('\n').forEach(line => {
    total += Math.max(1, Math.ceil((line.length || 1) / CHARS_PER_LINE));
  });
  return total;
}

function escHtml(s) {
  return s
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function clearAll() {
  fullText = '';
  ta.value = '';
  renderText();
  focusInput();
}

// ─────────────────────────────────────────
// Seal picker
// ─────────────────────────────────────────
function openSealPicker() {
  if (!fullText.trim()) { showToast('write something first…'); return; }
  const p = document.getElementById('sealPicker');
  p.style.display = 'flex'; requestAnimationFrame(() => p.classList.add('active'));
}
function closeSealPicker() {
  const p = document.getElementById('sealPicker');
  p.classList.remove('active'); setTimeout(() => { p.style.display = 'none'; }, 380);
}
function selectSeal(el) {
  document.querySelectorAll('.seal-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected'); selectedSeal = el.dataset.seal;
}
function confirmSeal() { closeSealPicker(); setTimeout(showShiba, 120); }
document.getElementById('sealPicker').addEventListener('click', e => {
  if (e.target === document.getElementById('sealPicker')) closeSealPicker();
});

// ─────────────────────────────────────────
// Shiba
// ─────────────────────────────────────────
function showShiba() {
  const sc = document.getElementById('shibaScene');
  sc.style.display='flex'; sc.style.opacity='0'; sc.style.transition='opacity .4s ease';
  requestAnimationFrame(() => { sc.style.opacity='1'; });
  setTimeout(() => {
    const c = document.getElementById('shibaCaption');
    c.textContent='*lick* ✨ sealed!'; c.classList.add('done');
  }, 2400);
  setTimeout(() => {
    sc.style.opacity='0';
    setTimeout(() => { sc.style.display='none'; showEnvelope(); }, 400);
  }, 4000);
}

// ─────────────────────────────────────────
// Envelope
// ─────────────────────────────────────────
function showEnvelope() {
  const r = document.getElementById('recipientInput').value.trim() || 'you';
  document.getElementById('sealSticker').textContent  = selectedSeal;
  document.getElementById('envRecipient').textContent = r;
  document.getElementById('envelopeScene').style.display = 'flex';
  document.getElementById('envelopeScene').classList.add('active');
}
function openEnvelopeAnim() {
  document.getElementById('theEnvelope').classList.add('opening');
  setTimeout(() => {
    document.getElementById('envelopeScene').classList.remove('active');
    document.getElementById('envelopeScene').style.display = 'none';
    document.getElementById('readingScene').style.display  = 'flex';
    document.getElementById('readingScene').classList.add('active');
    showReading(fullText, selectedSeal);
  }, 950);
}

// ─────────────────────────────────────────
// Reading
// ─────────────────────────────────────────
function showReading(text, seal) {
  const now = new Date();
  const mo  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('readingDate').textContent = mo[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  document.getElementById('readingSeal').textContent = seal;
  const bodyEl = document.getElementById('readingBody'); bodyEl.textContent = '';
  let i = 0; const spd = text.length > 300 ? 14 : 24;
  function tn() { if (i >= text.length) return; bodyEl.textContent += text[i++]; setTimeout(tn, spd + Math.random()*8); }
  setTimeout(tn, 800);
}

// ─────────────────────────────────────────
// Share
// ─────────────────────────────────────────
function shareLink() {
  const data = { t: fullText, s: selectedSeal, r: document.getElementById('recipientInput').value.trim() || 'you', d: new Date().toISOString() };
  const enc  = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const url  = window.location.origin + window.location.pathname + '?letter=' + enc;
  navigator.clipboard.writeText(url).then(() => showToast('link copied 🌸')).catch(() => prompt('Copy:', url));
}
function writeAnother() {
  ['envelopeScene','readingScene'].forEach(id => {
    document.getElementById(id).classList.remove('active');
    document.getElementById(id).style.display = 'none';
  });
  fullText = ''; ta.value = ''; renderText();
  document.getElementById('recipientInput').value = '';
  document.getElementById('writing').classList.remove('off');
  setTimeout(focusInput, 300);
}

// ─────────────────────────────────────────
// Shared letter from URL
// ─────────────────────────────────────────
function checkSharedLetter() {
  const enc = new URLSearchParams(window.location.search).get('letter');
  if (!enc) return false;
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(enc))));
    selectedSeal = data.s || '💌';
    document.getElementById('sealSticker').textContent  = selectedSeal;
    document.getElementById('envRecipient').textContent = data.r || 'you';
    document.getElementById('envHint').textContent      = 'click the envelope to read your letter ✨';
    document.getElementById('theEnvelope').onclick = () => {
      document.getElementById('theEnvelope').classList.add('opening');
      setTimeout(() => {
        document.getElementById('envelopeScene').classList.remove('active');
        document.getElementById('envelopeScene').style.display = 'none';
        document.getElementById('readingScene').style.display  = 'flex';
        document.getElementById('readingScene').classList.add('active');
        showReading(data.t || '', data.s || '💌');
      }, 950);
    };
    document.getElementById('envelopeScene').style.display = 'flex';
    document.getElementById('envelopeScene').classList.add('active');
    document.getElementById('writing').classList.add('off');
    return true;
  } catch(e) { return false; }
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
if (!checkSharedLetter()) document.getElementById('writing').classList.remove('off');
renderText();
</script>
