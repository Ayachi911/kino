<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kino-Typed</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=Dancing+Script:wght@600;700&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
:root{
  --ink:#1a1008;
  --paper:#f5f0e8;
  --cream:#fdf9f0;
  --rose:#8b2020;
  --gold:#c8a050;
  --blue-tw:#8ab0c8;
}
body{
  font-family:'Special Elite',cursive;
  background: #d4cfc8;
  background-image:
    repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(0,0,0,.012) 80px,rgba(0,0,0,.012) 81px),
    repeating-linear-gradient(0deg,transparent,transparent 80px,rgba(0,0,0,.012) 80px,rgba(0,0,0,.012) 81px);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}

/* grain overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

/* ── SCENE MANAGEMENT ── */
.scene{width:100%;display:flex;flex-direction:column;align-items:center}
.scene.off{display:none}

/* ════════════════════════════
   WRITING SCENE
════════════════════════════ */
#writing{
  padding: 2rem 1rem 4rem;
  position:relative;
}

.writing-title{
  font-family:'Dancing Script',cursive;
  font-size:1.8rem;
  color:#4a3828;
  letter-spacing:.05em;
  margin-bottom:1.6rem;
  opacity:.8;
  text-align:center;
  animation: fadeDown .8s ease both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:.8;transform:translateY(0)}}

/* ── THE TYPEWRITER COMPOSITE ── */
.typewriter-composite{
  position:relative;
  width: min(520px, 96vw);
  animation: riseIn .9s cubic-bezier(.22,1,.36,1) .2s both;
}
@keyframes riseIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* The paper strip that feeds UP */
.paper-feed-area{
  position:absolute;
  /* positioned so paper emerges from the platen slot */
  /* typewriter image: platen is roughly at 62% down the image */
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 52%;   /* matches paper width in the illustration */
  /* paper feeds up, so we anchor the bottom of this container
     to the platen line and let content grow upward */
  bottom: 38.5%; /* distance from bottom of tw image to platen */
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
  pointer-events: none;
  z-index: 5;
}

.paper-strip{
  width:100%;
  background: #f5f0e2;
  /* paper lines */
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 23px,
    rgba(180,160,120,.18) 23px,
    rgba(180,160,120,.18) 24px
  );
  box-shadow: 0 -4px 16px rgba(0,0,0,.12), 1px 0 0 rgba(0,0,0,.04), -1px 0 0 rgba(0,0,0,.04);
  padding: 0 10px 0 14px;
  /* height is driven by JS to create scroll effect */
  min-height: 100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  transition: transform .12s cubic-bezier(.25,.46,.45,.94);
}

/* Text typed on the paper */
.paper-text{
  font-family:'Special Elite',cursive;
  font-size:.82rem;
  line-height:24px;
  color:#1a1008;
  white-space:pre-wrap;
  word-break:break-word;
  padding-bottom: 4px;
}

/* blinking cursor line on current line */
.paper-cursor{
  display:inline-block;
  width:2px;height:.9em;
  background:#1a1008;
  vertical-align:text-bottom;
  margin-left:1px;
  animation:blink .7s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* the actual typewriter illustration */
.tw-img{
  width:100%;
  display:block;
  position:relative;
  z-index:10;
  pointer-events:none;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,.25));
}

/* invisible click target over the keyboard area */
.keyboard-target{
  position:absolute;
  bottom:0;left:0;right:0;
  height:38%;
  z-index:20;
  cursor:text;
}

.hidden-input{
  position:absolute;opacity:0;width:1px;height:1px;
  top:50%;left:50%;pointer-events:none;
}

/* ── KEY PRESS FLASH ── */
.key-flash{
  position:absolute;
  bottom: 6%;
  left:50%;transform:translateX(-50%);
  font-family:'Special Elite',cursive;
  font-size:.65rem;
  color:rgba(255,255,255,.8);
  background:rgba(80,110,140,.7);
  padding:.15rem .5rem;
  border-radius:3px;
  opacity:0;
  pointer-events:none;
  z-index:30;
  transition:opacity .08s;
  letter-spacing:.05em;
}
.key-flash.show{opacity:1}

/* carriage return flash */
.return-flash{
  position:absolute;
  top:36%;right:2%;
  font-family:'Special Elite',cursive;
  font-size:.55rem;
  color:rgba(255,255,255,.7);
  background:rgba(60,80,100,.65);
  padding:.1rem .4rem;
  border-radius:2px;
  opacity:0;
  pointer-events:none;
  z-index:30;
  transition:opacity .1s;
}
.return-flash.show{opacity:1}

/* ── CONTROLS ── */
.controls-bar{
  margin-top: 1.4rem;
  display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;
  animation: riseIn .9s cubic-bezier(.22,1,.36,1) .5s both;
}
.ctrl-btn{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.95rem;letter-spacing:.1em;
  padding:.55rem 1.6rem;border-radius:2px;cursor:pointer;
  transition:all .28s cubic-bezier(.22,1,.36,1);border:1px solid;
}
.ctrl-btn.primary{
  background:linear-gradient(135deg,#6a90a8,#4a6878);
  color:#f0f5f8;border-color:rgba(150,190,220,.4);
  box-shadow:0 4px 18px rgba(80,120,150,.3);
}
.ctrl-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(80,120,150,.45);}
.ctrl-btn.ghost{
  background:transparent;color:#5a7888;
  border-color:rgba(90,120,140,.3);
}
.ctrl-btn.ghost:hover{background:rgba(90,120,140,.08);}
.ctrl-btn:active{transform:scale(.97);}

/* paper counter */
.line-counter{
  font-family:'Special Elite',cursive;
  font-size:.62rem;color:rgba(90,80,70,.45);
  letter-spacing:.15em;text-align:center;
  margin-top:.6rem;
}

/* ════════════════════════════
   SEAL PICKER
════════════════════════════ */
#sealPicker{
  position:fixed;inset:0;z-index:200;
  background:rgba(14,8,4,.82);backdrop-filter:blur(8px) saturate(.7);
  display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .35s ease;
}
#sealPicker.active{display:flex;opacity:1}
.seal-modal{
  width:min(400px,92vw);
  background:linear-gradient(160deg,#fdf6e8,#f5e8d0);
  text-align:center;padding:2.4rem 2rem 2rem;
  box-shadow:0 28px 70px rgba(0,0,0,.5);
  border:1px solid rgba(200,80,80,.15);
  animation:modalRise .45s cubic-bezier(.22,1,.36,1) both;
}
@keyframes modalRise{from{opacity:0;transform:translateY(36px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.seal-title{font-family:'Dancing Script',cursive;font-size:2.2rem;color:#8b2020;margin-bottom:.15rem}
.seal-sub{font-family:'IM Fell English',serif;font-style:italic;font-size:.75rem;color:#8b2020;opacity:.6;letter-spacing:.15em;margin-bottom:1.2rem}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(180,60,60,.25),transparent);margin-bottom:1.2rem}
.seal-options{display:grid;grid-template-columns:repeat(4,1fr);gap:.55rem;margin-bottom:1.2rem}
.seal-opt{border:2px solid transparent;border-radius:7px;padding:.6rem .2rem;cursor:pointer;transition:all .22s cubic-bezier(.22,1,.36,1);background:rgba(255,255,255,.6)}
.seal-opt:hover{border-color:#e87878;transform:translateY(-3px) scale(1.05);box-shadow:0 5px 16px rgba(200,80,80,.2)}
.seal-opt.selected{border-color:#8b2020;background:rgba(220,150,150,.18)}
.seal-emoji{font-size:1.7rem;display:block;margin-bottom:.2rem}
.seal-label{font-family:'IM Fell English',serif;font-size:.57rem;color:#8b2020;font-style:italic}
.recipient-wrap{margin-bottom:1.2rem}
.recipient-label{font-family:'Dancing Script',cursive;font-size:.95rem;color:#8b2020;opacity:.65;display:block;margin-bottom:.35rem}
.recipient-input{background:transparent;border:none;border-bottom:1.5px solid rgba(180,60,60,.35);padding:.28rem .5rem;font-family:'Special Elite',cursive;font-size:.88rem;color:#1a1008;text-align:center;width:200px;outline:none;transition:border-color .3s}
.recipient-input:focus{border-bottom-color:#8b2020}
.recipient-input::placeholder{color:rgba(160,90,80,.35);font-style:italic}
.modal-actions{display:flex;flex-direction:column;gap:.55rem;align-items:center}
.modal-btn{width:100%;max-width:240px;font-family:'IM Fell English',serif;font-style:italic;font-size:.95rem;letter-spacing:.07em;padding:.62rem 1.4rem;border-radius:2px;cursor:pointer;transition:all .28s cubic-bezier(.22,1,.36,1);border:1.5px solid}
.modal-btn.primary{background:linear-gradient(135deg,#8b2020,#6a1010);color:#fff;border-color:rgba(200,80,80,.4);box-shadow:0 4px 16px rgba(160,30,30,.3)}
.modal-btn.primary:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(160,30,30,.45)}
.modal-btn.ghost{background:transparent;color:#8b2020;border-color:rgba(180,60,60,.25)}
.modal-btn.ghost:hover{background:rgba(180,60,60,.06)}

/* ════════════════════════════
   SHIBA SCENE
════════════════════════════ */
#shibaScene{
  position:fixed;inset:0;z-index:300;
  background:linear-gradient(160deg,#f8f0d8,#eedfc0,#e4d0a8);
  align-items:center;justify-content:center;flex-direction:column;display:none;
}
#shibaScene.active{display:flex}
.shiba-stage{width:min(460px,88vw);height:200px;position:relative;overflow:hidden;margin-bottom:1.2rem}
.shiba-floor{position:absolute;bottom:16px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(150,100,40,.2),transparent)}
.shiba-ani{position:absolute;bottom:20px;font-size:3.8rem;animation:shibaRun 2.8s cubic-bezier(.25,.46,.45,.94) forwards;filter:drop-shadow(3px 5px 8px rgba(0,0,0,.18))}
@keyframes shibaRun{0%{left:-80px;transform:scaleX(-1)}38%{left:calc(50% - 32px);transform:scaleX(-1)}45%{left:calc(50% - 32px);transform:scaleX(-1) rotate(-12deg)}55%{left:calc(50% - 32px);transform:scaleX(-1) rotate(12deg)}65%{left:calc(50% - 32px);transform:scaleX(-1) rotate(-4deg)}80%{left:calc(50% - 32px);transform:scaleX(-1) scale(1.06)}100%{left:calc(50% - 32px);transform:scaleX(-1) scale(1)}}
.env-on-stage{position:absolute;top:35%;right:16%;transform:translateY(-50%);font-size:3.2rem;filter:drop-shadow(2px 4px 8px rgba(0,0,0,.15))}
.shiba-caption{font-family:'Dancing Script',cursive;font-size:1.4rem;color:#8b2020;opacity:0;animation:fadeIn .5s ease 2.2s forwards;text-align:center}
.shiba-caption.done{animation:popIn .4s cubic-bezier(.22,1,.36,1) forwards}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ════════════════════════════
   ENVELOPE SCENE
════════════════════════════ */
#envelopeScene{
  display:none;min-height:100vh;flex-direction:column;
  align-items:center;justify-content:center;padding:3rem 1rem;
  background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(200,120,100,.12) 0%,transparent 60%),
    linear-gradient(170deg,#f5e8d8,#e8d4bc 40%,#dcc8a8);
}
#envelopeScene.active{display:flex}
.env-title{font-family:'Dancing Script',cursive;font-size:1.3rem;color:#8b2020;opacity:.55;letter-spacing:.1em;margin-bottom:2rem;animation:riseIn .7s ease forwards}
.envelope-wrap{perspective:1000px;margin-bottom:2.2rem;cursor:pointer;animation:riseIn .9s cubic-bezier(.22,1,.36,1) .1s both}
.envelope{width:min(360px,84vw);position:relative;transition:transform .5s cubic-bezier(.22,1,.36,1),filter .3s;filter:drop-shadow(0 14px 36px rgba(0,0,0,.2))}
.envelope:hover{transform:translateY(-7px) rotateX(4deg) rotateZ(-1deg);filter:drop-shadow(0 22px 46px rgba(0,0,0,.28))}
.envelope.opening{animation:envOpen 1.1s cubic-bezier(.22,1,.36,1) forwards}
@keyframes envOpen{0%{transform:translateY(0) scale(1);opacity:1}30%{transform:translateY(-20px) scale(1.05) rotateX(5deg)}70%{transform:translateY(10px) scale(.95) rotateX(-3deg);opacity:.8}100%{transform:translateY(80px) scale(.8) rotateX(15deg);opacity:0}}
.env-svg{width:100%;height:auto;display:block}
.env-address-overlay{position:absolute;bottom:19%;left:50%;transform:translateX(-50%);text-align:center;width:55%;pointer-events:none}
.addr-to{font-family:'IM Fell English',serif;font-style:italic;font-size:.62rem;color:#6a3030;opacity:.5;letter-spacing:.12em;display:block;margin-bottom:.2rem}
.addr-name{font-family:'Special Elite',cursive;font-size:.76rem;color:#3a1818;opacity:.68}
.seal-sticker-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;z-index:10;filter:drop-shadow(0 3px 8px rgba(0,0,0,.22));transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none}
.envelope:hover .seal-sticker-overlay{transform:translate(-50%,-50%) scale(1.12) rotate(5deg)}
.env-actions{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.4rem;animation:riseIn .7s ease .3s both}
.env-hint{font-family:'IM Fell English',serif;font-style:italic;font-size:.78rem;color:#6a4830;opacity:.48;text-align:center;animation:riseIn .7s ease .5s both}

/* ════════════════════════════
   READING SCENE — love letter paper
════════════════════════════ */
#readingScene{
  display:none;min-height:100vh;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:3rem 1rem 5rem;
  background:linear-gradient(160deg,#f0e8d8,#e8dcc8);
}
#readingScene.active{display:flex}

.letter-paper-wrap{
  width:min(500px,90vw);
  position:relative;
  animation:pageUnfurl .9s cubic-bezier(.22,1,.36,1) forwards;
  transform-origin:top center;
  filter:drop-shadow(0 12px 36px rgba(0,0,0,.18));
}
@keyframes pageUnfurl{0%{transform:scaleY(.01) rotateX(20deg);opacity:0}55%{transform:scaleY(1.03) rotateX(-2deg);opacity:1}100%{transform:scaleY(1) rotateX(0deg);opacity:1}}

.letter-bg-img{
  width:100%;display:block;border-radius:2px;
}

/* text overlaid on the letter template */
.letter-text-overlay{
  position:absolute;
  /* adjust these to sit inside the ornate border of the template */
  top:28%;left:12%;right:12%;bottom:18%;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.letter-date-line{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:.7rem;color:#5a2020;opacity:.6;
  text-align:right;margin-bottom:.8rem;letter-spacing:.05em;
}
.letter-body-text{
  font-family:'Special Elite',cursive;
  font-size:.82rem;line-height:26px;
  color:#2a1010;white-space:pre-wrap;word-break:break-word;
  flex:1;overflow:hidden;
}
.letter-seal-bottom{
  text-align:center;margin-top:.8rem;font-size:1.8rem;opacity:.5;
  animation:riseIn .5s ease 1.5s both;
}
.reading-back{margin-top:2rem;animation:riseIn .7s ease .5s both}

/* ── SHARED ── */
@keyframes riseIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:2.2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1008;color:rgba(200,160,80,.9);font-family:'IM Fell English',serif;font-style:italic;padding:.65rem 1.8rem;border-radius:2px;font-size:.86rem;letter-spacing:.06em;transition:transform .42s cubic-bezier(.22,1,.36,1);z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

════════════════════════════ -->
<div id="sealPicker">
  <div class="seal-modal">
    <div class="seal-title">Love Letters</div>
    <div class="seal-sub">× choose your seal ×</div>
    <div class="divider"></div>
    <div class="seal-options">
      <div class="seal-opt selected" data-seal="💌" onclick="selectSeal(this)"><span class="seal-emoji">💌</span><span class="seal-label">love</span></div>
      <div class="seal-opt" data-seal="🕊️" onclick="selectSeal(this)"><span class="seal-emoji">🕊️</span><span class="seal-label">official</span></div>
      <div class="seal-opt" data-seal="🌸" onclick="selectSeal(this)"><span class="seal-emoji">🌸</span><span class="seal-label">sakura</span></div>
      <div class="seal-opt" data-seal="🌙" onclick="selectSeal(this)"><span class="seal-emoji">🌙</span><span class="seal-label">moonlit</span></div>
      <div class="seal-opt" data-seal="🍵" onclick="selectSeal(this)"><span class="seal-emoji">🍵</span><span class="seal-label">matcha</span></div>
      <div class="seal-opt" data-seal="🎐" onclick="selectSeal(this)"><span class="seal-emoji">🎐</span><span class="seal-label">windbell</span></div>
      <div class="seal-opt" data-seal="🐾" onclick="selectSeal(this)"><span class="seal-emoji">🐾</span><span class="seal-label">shiba</span></div>
      <div class="seal-opt" data-seal="✨" onclick="selectSeal(this)"><span class="seal-emoji">✨</span><span class="seal-label">shimmer</span></div>
    </div>
    <div class="recipient-wrap">
      <span class="recipient-label">addressed to —</span>
      <input class="recipient-input" id="recipientInput" type="text" placeholder="their name…" maxlength="40">
    </div>
    <div class="divider"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="confirmSeal()">summon the shiba 🐕</button>
      <button class="modal-btn ghost" onclick="closeSealPicker()">keep writing</button>
    </div>
  </div>
</div>

<script>
// ── State
let fullText = '';
let selectedSeal = '\u{1F48C}';
const LINE_HEIGHT_PX = 24;   // matches CSS line-height
const CHARS_PER_LINE = 38;   // approximate chars before wrap
let currentLine = 1;
let carriageShake = false;

// ── Audio
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

function playClack(){
  initAudio();const now=audioCtx.currentTime;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.048,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*.009));
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const gain=audioCtx.createGain();gain.gain.setValueAtTime(.16+Math.random()*.07,now);gain.gain.exponentialRampToValueAtTime(.001,now+.048);
  const filt=audioCtx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=1700+Math.random()*500;filt.Q.value=.85;
  src.connect(filt);filt.connect(gain);gain.connect(audioCtx.destination);src.start(now);
}

function playReturn(){
  initAudio();const now=audioCtx.currentTime;
  // carriage return: lower pitch mechanical slide
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.22,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*.08))*.55;
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const gain=audioCtx.createGain();gain.gain.setValueAtTime(.3,now);gain.gain.exponentialRampToValueAtTime(.001,now+.22);
  // pitch it lower
  const filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;
  src.connect(filt);filt.connect(gain);gain.connect(audioCtx.destination);src.start(now);
}

function playBell(){
  // end-of-line bell ping
  initAudio();const now=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.frequency.setValueAtTime(2200,now);
  osc.frequency.exponentialRampToValueAtTime(1800,now+.12);
  gain.gain.setValueAtTime(.18,now);
  gain.gain.exponentialRampToValueAtTime(.001,now+.35);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start(now);osc.stop(now+.35);
}

// ── Input
function focusInput(){document.getElementById('hiddenInput').focus();}
setTimeout(focusInput,400);

document.getElementById('hiddenInput').addEventListener('keydown',e=>{
  initAudio();
  if(e.key==='Backspace'){
    if(fullText.length>0){fullText=fullText.slice(0,-1);playClack();renderText();}
    e.preventDefault();return;
  }
  if(e.key==='Enter'){
    fullText+='\n';playReturn();showReturnFlash();renderText();e.preventDefault();return;
  }
  if(e.key.length===1){
    fullText+=e.key;playClack();flashKey(e.key);renderText();
    // ring bell near end of line
    const lineLen=getCurrentLineLength();
    if(lineLen===CHARS_PER_LINE-4) playBell();
    e.preventDefault();
  }
});

function getCurrentLineLength(){
  const lines=fullText.split('\n');
  return lines[lines.length-1].length;
}

function flashKey(k){
  const el=document.getElementById('keyFlash');
  el.textContent=k.toUpperCase();
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),120);
}
function showReturnFlash(){
  const el=document.getElementById('returnFlash');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),300);
}

// ── Render: the key mechanic — paper scrolls UP as lines are added
function renderText(){
  const pt=document.getElementById('paperText');
  const strip=document.getElementById('paperStrip');
  const feedArea=document.getElementById('paperFeedArea');

  // display text + cursor
  const escaped=escHtml(fullText);
  pt.innerHTML=escaped+'<span class="paper-cursor"></span>';

  // count lines to figure out how much to scroll up
  const lineCount=countVisualLines(fullText);
  currentLine=lineCount;
  document.getElementById('lineCounter').textContent=
    'line '+lineCount+(lineCount>25?' · almost there…':'');

  // shift paper upward: each new line pushes paper up by LINE_HEIGHT_PX
  // paper feeds from below; as lines accumulate, strip translates upward
  const scrollUp = Math.max(0,(lineCount-1)*LINE_HEIGHT_PX);
  strip.style.transform=`translateY(-${scrollUp}px)`;
  // also increase strip min-height so old lines are preserved above
  strip.style.paddingTop=(scrollUp+20)+'px';
}

function countVisualLines(text){
  // count actual newlines + approximate wraps
  const raw=text.split('\n');
  let total=0;
  raw.forEach(line=>{
    total+=Math.max(1,Math.ceil(line.length/CHARS_PER_LINE)||1);
  });
  return total;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function clearAll(){fullText='';renderText();focusInput();}

// ── Seal picker
function openSealPicker(){
  if(!fullText.trim()){showToast('write something first…');return;}
  const p=document.getElementById('sealPicker');p.style.display='flex';
  requestAnimationFrame(()=>p.classList.add('active'));
}
function closeSealPicker(){
  const p=document.getElementById('sealPicker');p.classList.remove('active');
  setTimeout(()=>{p.style.display='none';},380);
}
function selectSeal(el){
  document.querySelectorAll('.seal-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');selectedSeal=el.dataset.seal;
}
function confirmSeal(){closeSealPicker();setTimeout(showShiba,120);}
document.getElementById('sealPicker').addEventListener('click',e=>{if(e.target===document.getElementById('sealPicker'))closeSealPicker();});

// ── Shiba
function showShiba(){
  const sc=document.getElementById('shibaScene');
  sc.style.display='flex';sc.style.opacity='0';sc.style.transition='opacity .4s ease';
  requestAnimationFrame(()=>{sc.style.opacity='1';});
  setTimeout(()=>{const c=document.getElementById('shibaCaption');c.textContent='*lick* ✨ sealed!';c.classList.add('done');},2400);
  setTimeout(()=>{sc.style.opacity='0';setTimeout(()=>{sc.style.display='none';showEnvelope();},400);},4000);
}

// ── Envelope
function showEnvelope(){
  const r=document.getElementById('recipientInput').value.trim()||'you';
  document.getElementById('sealSticker').textContent=selectedSeal;
  document.getElementById('envRecipient').textContent=r;
  document.getElementById('envelopeScene').style.display='flex';
  document.getElementById('envelopeScene').classList.add('active');
}
function openEnvelopeAnim(){
  const env=document.getElementById('theEnvelope');env.classList.add('opening');
  setTimeout(()=>{
    document.getElementById('envelopeScene').classList.remove('active');
    document.getElementById('envelopeScene').style.display='none';
    document.getElementById('readingScene').style.display='flex';
    document.getElementById('readingScene').classList.add('active');
    showReading(fullText,selectedSeal);
  },950);
}

// ── Reading
function showReading(text,seal){
  const now=new Date();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('readingDate').textContent=months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
  document.getElementById('readingSeal').textContent=seal;
  const bodyEl=document.getElementById('readingBody');bodyEl.textContent='';
  let i=0;const spd=text.length>300?14:24;
  function tn(){if(i>=text.length)return;bodyEl.textContent+=text[i++];setTimeout(tn,spd+Math.random()*8);}
  setTimeout(tn,800);
}

// ── Share
function shareLink(){
  const data={t:fullText,s:selectedSeal,r:document.getElementById('recipientInput').value.trim()||'you',d:new Date().toISOString()};
  const enc=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  const url=window.location.origin+window.location.pathname+'?letter='+enc;
  navigator.clipboard.writeText(url).then(()=>showToast('link copied 🌸')).catch(()=>prompt('Copy:',url));
}
function writeAnother(){
  document.getElementById('envelopeScene').classList.remove('active');document.getElementById('envelopeScene').style.display='none';
  document.getElementById('readingScene').classList.remove('active');document.getElementById('readingScene').style.display='none';
  fullText='';renderText();document.getElementById('recipientInput').value='';
  document.getElementById('writing').classList.remove('off');
  setTimeout(focusInput,300);
}

// ── Shared letter from URL
function checkSharedLetter(){
  const enc=new URLSearchParams(window.location.search).get('letter');if(!enc)return false;
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(enc))));
    selectedSeal=data.s||'\u{1F48C}';
    document.getElementById('sealSticker').textContent=selectedSeal;
    document.getElementById('envRecipient').textContent=data.r||'you';
    document.getElementById('envHint').textContent='click the envelope to read your letter ✨';
    document.getElementById('theEnvelope').onclick=()=>{
      document.getElementById('theEnvelope').classList.add('opening');
      setTimeout(()=>{
        document.getElementById('envelopeScene').classList.remove('active');document.getElementById('envelopeScene').style.display='none';
        document.getElementById('readingScene').style.display='flex';document.getElementById('readingScene').classList.add('active');
        showReading(data.t||'',data.s||'\u{1F48C}');
      },950);
    };
    document.getElementById('envelopeScene').style.display='flex';document.getElementById('envelopeScene').classList.add('active');
    document.getElementById('writing').classList.add('off');
    return true;
  }catch(e){return false;}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ── Init
if(!checkSharedLetter()){document.getElementById('writing').classList.remove('off');}
renderText();
</script>
</body>
</html>
